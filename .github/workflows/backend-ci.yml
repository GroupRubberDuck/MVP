name: Backend CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    name: Unit Tests and Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      # Cache del venv nella root (dove Poetry lo crea)
      - name: Load cached venv
        id: cached-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-python3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Run Ruff (Analisi Statica)
        run: poetry run ruff check backend/ --output-format=junit -o ruff-report.xml

      - name: Run Unit Tests and Coverage
        run: poetry run pytest --junitxml=test-results.xml

      - name: Salva i Report come Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            ruff-report.xml
            coverage.xml
            test-results.xml
          retention-days: 30