name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    name: Unit Tests and Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction
      
      - name: Run Ruff (Analisi Statica)
        run: poetry run ruff check backend/ --output-format=junit -o ruff-report.xml

      - name: Run Unit Tests and Coverage
        # Aggiorna il percorso della cartella test e quello della coverage
        run: poetry run pytest backend/tests/unit/ --cov=backend/src --cov-report=xml:coverage.xml --junitxml=test-results.xml
      - name: Salva i Report come Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            ruff-report.xml
            coverage.xml
            test-results.xml
          retention-days: 30
