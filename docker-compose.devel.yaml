name: poc

services:
  backend:
    build:
      dockerfile: backend/Dockerfile.devel
    restart: always
    volumes:
      - ./:/app
    ports:
      - 5000:5000
    links:
      - mongo
    environment:
      DB_HOST: mongo
      DB_PORT: 27017
      DB_USER: root
      DB_PASSWORD: grouprubberduckpoc2026
    depends_on:
      - mongo

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: grouprubberduckpoc2026

  mongo-express:                            # optional web UI for MongoDB
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: grouprubberduckpoc2026
      ME_CONFIG_BASICAUTH: "false"
    links:
      - mongo
    depends_on:
      - mongo

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    restart: always
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run watch"